<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 380" fill="none">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="260" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="glow6" cx="130" cy="130" r="110" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="260" height="380" fill="url(#bg6)"/>
  <rect width="260" height="380" fill="url(#glow6)"/>
  <!-- Browser window -->
  <rect x="35" y="60" width="190" height="160" rx="6" stroke="#D4AF37" stroke-width="1" fill="none" stroke-opacity="0.2"/>
  <!-- Browser bar -->
  <line x1="35" y1="78" x2="225" y2="78" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.15"/>
  <circle cx="49" cy="69" r="3" fill="#D4AF37" fill-opacity="0.3"/>
  <circle cx="59" cy="69" r="3" fill="#D4AF37" fill-opacity="0.15"/>
  <circle cx="69" cy="69" r="3" fill="#D4AF37" fill-opacity="0.1"/>
  <rect x="90" y="66" width="80" height="6" rx="3" fill="#D4AF37" fill-opacity="0.06" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.1"/>
  <!-- Page content - hero area -->
  <rect x="50" y="90" width="80" height="8" rx="2" fill="#D4AF37" fill-opacity="0.15"/>
  <rect x="50" y="104" width="60" height="5" rx="1" fill="white" fill-opacity="0.06"/>
  <rect x="50" y="114" width="50" height="5" rx="1" fill="white" fill-opacity="0.04"/>
  <!-- CTA button -->
  <rect x="50" y="128" width="55" height="16" rx="4" fill="#D4AF37" fill-opacity="0.2" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.3"/>
  <!-- Form on right side -->
  <rect x="150" y="88" width="60" height="80" rx="4" stroke="#D4AF37" stroke-width="0.8" fill="#D4AF37" fill-opacity="0.03" stroke-opacity="0.2"/>
  <rect x="158" y="98" width="44" height="8" rx="2" fill="white" fill-opacity="0.04" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.1"/>
  <rect x="158" y="112" width="44" height="8" rx="2" fill="white" fill-opacity="0.04" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.1"/>
  <rect x="158" y="126" width="44" height="8" rx="2" fill="white" fill-opacity="0.04" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.1"/>
  <rect x="158" y="144" width="44" height="14" rx="3" fill="#D4AF37" fill-opacity="0.15" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.3"/>
  <!-- Speed indicator -->
  <circle cx="130" cy="240" r="18" stroke="#D4AF37" stroke-width="1" fill="none" stroke-opacity="0.2"/>
  <path d="M130 228 L130 240" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round"/>
  <path d="M130 240 L140 248" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round"/>
  <text x="130" y="268" text-anchor="middle" fill="#D4AF37" font-family="sans-serif" font-size="8" opacity="0.35">&lt;2s load</text>
  <!-- Label area -->
  <text x="130" y="300" text-anchor="middle" fill="#D4AF37" font-family="sans-serif" font-size="11" font-weight="600" letter-spacing="3" opacity="0.5">CONVERSION</text>
  <text x="130" y="325" text-anchor="middle" fill="white" font-family="serif" font-size="20" font-weight="600" opacity="0.7">Landing Pages</text>
  <text x="130" y="350" text-anchor="middle" fill="white" font-family="sans-serif" font-size="11" opacity="0.25">Sub-2s mobile loads</text>
</svg>