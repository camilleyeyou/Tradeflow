<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 380" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="260" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="glow1" cx="130" cy="160" r="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="260" height="380" fill="url(#bg1)"/>
  <rect width="260" height="380" fill="url(#glow1)"/>
  <!-- Map pin -->
  <path d="M130 80c-28 0-50 22-50 50 0 38 50 80 50 80s50-42 50-80c0-28-22-50-50-50z" stroke="#D4AF37" stroke-width="1.5" fill="none" stroke-opacity="0.6"/>
  <circle cx="130" cy="130" r="18" stroke="#D4AF37" stroke-width="1.5" fill="none" stroke-opacity="0.4"/>
  <!-- Search icon inside pin -->
  <circle cx="126" cy="127" r="8" stroke="#D4AF37" stroke-width="1.2" fill="none" stroke-opacity="0.8"/>
  <line x1="132" y1="133" x2="138" y2="139" stroke="#D4AF37" stroke-width="1.2" stroke-opacity="0.8" stroke-linecap="round"/>
  <!-- Google badge check -->
  <circle cx="155" cy="100" r="10" fill="#D4AF37" fill-opacity="0.15" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.4"/>
  <polyline points="150,100 153,103 160,96" stroke="#D4AF37" stroke-width="1.2" fill="none" stroke-opacity="0.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Radiating circles -->
  <circle cx="130" cy="130" r="60" stroke="#D4AF37" stroke-width="0.5" fill="none" stroke-opacity="0.1"/>
  <circle cx="130" cy="130" r="90" stroke="#D4AF37" stroke-width="0.5" fill="none" stroke-opacity="0.06"/>
  <circle cx="130" cy="130" r="120" stroke="#D4AF37" stroke-width="0.5" fill="none" stroke-opacity="0.03"/>
  <!-- Label area -->
  <text x="130" y="280" text-anchor="middle" fill="#D4AF37" font-family="sans-serif" font-size="11" font-weight="600" letter-spacing="3" opacity="0.5">GOOGLE LSA</text>
  <text x="130" y="305" text-anchor="middle" fill="white" font-family="serif" font-size="20" font-weight="600" opacity="0.7">Top of Search</text>
  <text x="130" y="330" text-anchor="middle" fill="white" font-family="sans-serif" font-size="11" opacity="0.25">Pay only for real leads</text>
</svg>