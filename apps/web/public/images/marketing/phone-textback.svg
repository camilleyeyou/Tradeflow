<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 560" fill="none">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="320" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111113"/>
      <stop offset="100%" stop-color="#0a0a0b"/>
    </linearGradient>
    <clipPath id="phoneClip"><rect x="30" y="20" width="260" height="520" rx="32"/></clipPath>
  </defs>

  <!-- Phone outer shell -->
  <rect x="30" y="20" width="260" height="520" rx="32" fill="#1a1a1c" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <g clip-path="url(#phoneClip)">
    <!-- Screen background -->
    <rect x="30" y="20" width="260" height="520" fill="url(#pbg)"/>

    <!-- Status bar -->
    <text x="50" y="48" fill="white" font-family="sans-serif" font-size="11" font-weight="600" opacity="0.6">9:41</text>
    <text x="254" y="48" fill="white" font-family="sans-serif" font-size="10" opacity="0.4" text-anchor="end">●●●● 5G</text>

    <!-- Missed call notification card -->
    <rect x="44" y="64" width="232" height="70" rx="14" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
    <circle cx="66" cy="88" r="14" fill="rgba(239,68,68,0.15)"/>
    <!-- Phone icon -->
    <path d="M60 84h4l2 4-2 1.5a8 8 0 004 4l1.5-2 4 2v3a1 1 0 01-1 1 11 11 0 01-11-11 1 1 0 011-1" stroke="#ef4444" stroke-width="1.2" fill="none" opacity="0.8" transform="translate(0,0)"/>
    <text x="88" y="84" fill="white" font-family="sans-serif" font-size="12" font-weight="600" opacity="0.8">Missed Call</text>
    <text x="88" y="100" fill="white" font-family="sans-serif" font-size="11" opacity="0.4">(773) 555-0142</text>
    <text x="88" y="118" fill="white" font-family="sans-serif" font-size="10" opacity="0.25">Just now · Chicago, IL</text>

    <!-- Arrow / Flow indicator -->
    <text x="160" y="155" fill="#D4AF37" font-family="sans-serif" font-size="10" font-weight="600" text-anchor="middle" opacity="0.5">↓ Auto text-back sent in 47 seconds</text>

    <!-- Messages area header -->
    <rect x="44" y="170" width="232" height="36" rx="0" fill="none"/>
    <text x="160" y="192" fill="white" font-family="sans-serif" font-size="13" font-weight="600" text-anchor="middle" opacity="0.7">(773) 555-0142</text>
    <line x1="44" y1="202" x2="276" y2="202" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Time stamp -->
    <text x="160" y="224" fill="white" font-family="sans-serif" font-size="9" text-anchor="middle" opacity="0.2">Today 2:34 PM</text>

    <!-- Auto-reply message bubble (from your company) -->
    <rect x="60" y="238" width="200" height="108" rx="14" fill="rgba(212,175,55,0.1)" stroke="rgba(212,175,55,0.15)" stroke-width="1"/>
    <text x="74" y="260" fill="white" font-family="sans-serif" font-size="11.5" opacity="0.8">Hi! This is Reliable HVAC.</text>
    <text x="74" y="278" fill="white" font-family="sans-serif" font-size="11.5" opacity="0.8">Sorry we missed your call!</text>
    <text x="74" y="296" fill="white" font-family="sans-serif" font-size="11.5" opacity="0.8">We'll call you back within</text>
    <text x="74" y="314" fill="white" font-family="sans-serif" font-size="11.5" opacity="0.8">the hour. Need emergency</text>
    <text x="74" y="332" fill="white" font-family="sans-serif" font-size="11.5" opacity="0.8">service? Reply YES.</text>
    <text x="252" y="352" fill="white" font-family="sans-serif" font-size="9" text-anchor="end" opacity="0.25">2:34 PM ✓✓</text>

    <!-- Customer reply bubble -->
    <rect x="110" y="370" width="160" height="42" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="124" y="392" fill="white" font-family="sans-serif" font-size="12" opacity="0.75">Yes please! AC is out</text>
    <text x="262" y="408" fill="white" font-family="sans-serif" font-size="9" text-anchor="end" opacity="0.2">2:35 PM</text>

    <!-- Lead captured indicator -->
    <rect x="54" y="430" width="212" height="40" rx="10" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.15)" stroke-width="1"/>
    <circle cx="74" cy="450" r="10" fill="rgba(34,197,94,0.15)"/>
    <text x="70" y="454" fill="#22c55e" font-family="sans-serif" font-size="11" font-weight="700">✓</text>
    <text x="92" y="447" fill="#22c55e" font-family="sans-serif" font-size="10" font-weight="600">Lead captured in dashboard</text>
    <text x="92" y="460" fill="white" font-family="sans-serif" font-size="9" opacity="0.3">Automatically tagged: Emergency AC</text>

    <!-- Timer badge -->
    <rect x="84" y="486" width="152" height="28" rx="14" fill="rgba(212,175,55,0.08)" stroke="rgba(212,175,55,0.12)" stroke-width="1"/>
    <text x="160" y="504" fill="#D4AF37" font-family="sans-serif" font-size="10" font-weight="600" text-anchor="middle">⚡ Response time: 47 seconds</text>
  </g>

  <!-- Phone notch -->
  <rect x="120" y="24" width="80" height="22" rx="11" fill="#0a0a0b"/>

  <!-- Outer border glow -->
  <rect x="30" y="20" width="260" height="520" rx="32" fill="none" stroke="rgba(212,175,55,0.06)" stroke-width="1"/>
</svg>