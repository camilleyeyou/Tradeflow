<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" fill="none">
  <defs>
    <linearGradient id="tbg" x1="0" y1="0" x2="560" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111113"/>
      <stop offset="100%" stop-color="#0a0a0b"/>
    </linearGradient>
    <clipPath id="tround"><rect width="560" height="400" rx="12"/></clipPath>
  </defs>
  <rect width="560" height="400" rx="12" fill="url(#tbg)"/>
  <g clip-path="url(#tround)">
    <!-- Header -->
    <text x="30" y="34" fill="white" font-family="sans-serif" font-size="14" font-weight="600" opacity="0.8">Call Analytics</text>
    <text x="30" y="52" fill="white" font-family="sans-serif" font-size="11" opacity="0.3">Last 30 days · All campaigns</text>

    <!-- Time range pills -->
    <rect x="370" y="20" width="40" height="22" rx="4" fill="rgba(255,255,255,0.04)"/>
    <text x="382" y="35" fill="white" font-family="sans-serif" font-size="9" opacity="0.3" text-anchor="middle">7d</text>
    <rect x="416" y="20" width="40" height="22" rx="4" fill="rgba(212,175,55,0.12)" stroke="rgba(212,175,55,0.2)" stroke-width="1"/>
    <text x="428" y="35" fill="#D4AF37" font-family="sans-serif" font-size="9" font-weight="600" text-anchor="middle">30d</text>
    <rect x="462" y="20" width="40" height="22" rx="4" fill="rgba(255,255,255,0.04)"/>
    <text x="474" y="35" fill="white" font-family="sans-serif" font-size="9" opacity="0.3" text-anchor="middle">90d</text>
    <rect x="508" y="20" width="40" height="22" rx="4" fill="rgba(255,255,255,0.04)"/>
    <text x="520" y="35" fill="white" font-family="sans-serif" font-size="9" opacity="0.3" text-anchor="middle">All</text>

    <!-- Big stat cards -->
    <rect x="30" y="68" width="120" height="64" rx="8" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="44" y="88" fill="white" font-family="sans-serif" font-size="9" opacity="0.35" letter-spacing="1">TOTAL CALLS</text>
    <text x="44" y="118" fill="white" font-family="sans-serif" font-size="26" font-weight="700">142</text>

    <rect x="164" y="68" width="120" height="64" rx="8" fill="rgba(34,197,94,0.04)" stroke="rgba(34,197,94,0.1)" stroke-width="1"/>
    <text x="178" y="88" fill="#22c55e" font-family="sans-serif" font-size="9" opacity="0.7" letter-spacing="1">ANSWERED</text>
    <text x="178" y="118" fill="#22c55e" font-family="sans-serif" font-size="26" font-weight="700">118</text>

    <rect x="298" y="68" width="120" height="64" rx="8" fill="rgba(239,68,68,0.04)" stroke="rgba(239,68,68,0.08)" stroke-width="1"/>
    <text x="312" y="88" fill="#ef4444" font-family="sans-serif" font-size="9" opacity="0.7" letter-spacing="1">MISSED</text>
    <text x="312" y="118" fill="#ef4444" font-family="sans-serif" font-size="26" font-weight="700">24</text>
    <text x="356" y="118" fill="#22c55e" font-family="sans-serif" font-size="10">→ 22 texted</text>

    <rect x="432" y="68" width="116" height="64" rx="8" fill="rgba(212,175,55,0.04)" stroke="rgba(212,175,55,0.1)" stroke-width="1"/>
    <text x="446" y="88" fill="#D4AF37" font-family="sans-serif" font-size="9" opacity="0.7" letter-spacing="1">BOOKED</text>
    <text x="446" y="118" fill="#D4AF37" font-family="sans-serif" font-size="26" font-weight="700">67</text>
    <text x="488" y="118" fill="white" font-family="sans-serif" font-size="10" opacity="0.3">47%</text>

    <!-- Chart area -->
    <text x="30" y="162" fill="white" font-family="sans-serif" font-size="11" opacity="0.4" font-weight="500">Calls by week</text>
    <!-- Y-axis labels -->
    <text x="30" y="188" fill="white" font-family="sans-serif" font-size="9" opacity="0.2">40</text>
    <text x="30" y="222" fill="white" font-family="sans-serif" font-size="9" opacity="0.2">30</text>
    <text x="30" y="256" fill="white" font-family="sans-serif" font-size="9" opacity="0.2">20</text>
    <text x="30" y="290" fill="white" font-family="sans-serif" font-size="9" opacity="0.2">10</text>
    <!-- Grid lines -->
    <line x1="50" y1="184" x2="540" y2="184" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="50" y1="218" x2="540" y2="218" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="50" y1="252" x2="540" y2="252" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="50" y1="286" x2="540" y2="286" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="50" y1="300" x2="540" y2="300" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

    <!-- Bars — Week 1 -->
    <rect x="80" y="252" width="30" height="48" rx="3" fill="rgba(212,175,55,0.3)"/>
    <rect x="116" y="270" width="30" height="30" rx="3" fill="rgba(34,197,94,0.3)"/>
    <!-- Week 2 -->
    <rect x="176" y="230" width="30" height="70" rx="3" fill="rgba(212,175,55,0.35)"/>
    <rect x="212" y="248" width="30" height="52" rx="3" fill="rgba(34,197,94,0.35)"/>
    <!-- Week 3 -->
    <rect x="272" y="210" width="30" height="90" rx="3" fill="rgba(212,175,55,0.4)"/>
    <rect x="308" y="234" width="30" height="66" rx="3" fill="rgba(34,197,94,0.4)"/>
    <!-- Week 4 -->
    <rect x="368" y="196" width="30" height="104" rx="3" fill="rgba(212,175,55,0.5)"/>
    <rect x="404" y="218" width="30" height="82" rx="3" fill="rgba(34,197,94,0.45)"/>

    <!-- X labels -->
    <text x="108" y="318" fill="white" font-family="sans-serif" font-size="9" text-anchor="middle" opacity="0.2">Week 1</text>
    <text x="204" y="318" fill="white" font-family="sans-serif" font-size="9" text-anchor="middle" opacity="0.2">Week 2</text>
    <text x="300" y="318" fill="white" font-family="sans-serif" font-size="9" text-anchor="middle" opacity="0.2">Week 3</text>
    <text x="396" y="318" fill="white" font-family="sans-serif" font-size="9" text-anchor="middle" opacity="0.2">Week 4</text>

    <!-- Legend -->
    <rect x="470" y="174" width="10" height="10" rx="2" fill="rgba(212,175,55,0.4)"/>
    <text x="486" y="183" fill="white" font-family="sans-serif" font-size="10" opacity="0.35">Total calls</text>
    <rect x="470" y="192" width="10" height="10" rx="2" fill="rgba(34,197,94,0.4)"/>
    <text x="486" y="201" fill="white" font-family="sans-serif" font-size="10" opacity="0.35">Booked</text>

    <!-- Source breakdown -->
    <text x="30" y="348" fill="white" font-family="sans-serif" font-size="11" opacity="0.4" font-weight="500">Top sources</text>
    <rect x="30" y="358" width="160" height="30" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <text x="44" y="378" fill="white" font-family="sans-serif" font-size="11" opacity="0.5">Google LSA</text>
    <text x="170" y="378" fill="#D4AF37" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="end">68%</text>

    <rect x="200" y="358" width="160" height="30" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <text x="214" y="378" fill="white" font-family="sans-serif" font-size="11" opacity="0.5">Landing Page</text>
    <text x="340" y="378" fill="white" font-family="sans-serif" font-size="11" font-weight="600" opacity="0.4" text-anchor="end">22%</text>

    <rect x="370" y="358" width="160" height="30" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <text x="384" y="378" fill="white" font-family="sans-serif" font-size="11" opacity="0.5">Direct Call</text>
    <text x="510" y="378" fill="white" font-family="sans-serif" font-size="11" font-weight="600" opacity="0.4" text-anchor="end">10%</text>

    <rect x="0" y="0" width="560" height="400" rx="12" fill="none" stroke="rgba(212,175,55,0.08)" stroke-width="1"/>
  </g>
</svg>