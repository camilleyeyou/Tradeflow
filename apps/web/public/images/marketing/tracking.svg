<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 380" fill="none">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="260" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="glow5" cx="130" cy="140" r="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="260" height="380" fill="url(#bg5)"/>
  <rect width="260" height="380" fill="url(#glow5)"/>
  <!-- Phone with signal -->
  <rect x="100" y="80" width="60" height="100" rx="10" stroke="#D4AF37" stroke-width="1.2" fill="none" stroke-opacity="0.35"/>
  <rect x="120" y="85" width="20" height="3" rx="1.5" fill="#D4AF37" fill-opacity="0.2"/>
  <!-- Call wave on screen -->
  <circle cx="130" cy="125" r="10" stroke="#D4AF37" stroke-width="1" fill="#D4AF37" fill-opacity="0.08" stroke-opacity="0.4"/>
  <path d="M124 122c0 0 3-3 6-3s6 3 6 3" stroke="#D4AF37" stroke-width="1" fill="none" stroke-opacity="0.6" stroke-linecap="round"/>
  <path d="M121 119c0 0 5-5 9-5s9 5 9 5" stroke="#D4AF37" stroke-width="0.8" fill="none" stroke-opacity="0.3" stroke-linecap="round"/>
  <circle cx="130" cy="128" r="2" fill="#D4AF37" fill-opacity="0.6"/>
  <!-- Signal waves emanating -->
  <path d="M165 100 Q 180 115 165 130" stroke="#D4AF37" stroke-width="0.8" fill="none" stroke-opacity="0.25"/>
  <path d="M175 95 Q 195 115 175 135" stroke="#D4AF37" stroke-width="0.8" fill="none" stroke-opacity="0.15"/>
  <path d="M185 90 Q 210 115 185 140" stroke="#D4AF37" stroke-width="0.8" fill="none" stroke-opacity="0.08"/>
  <!-- Analytics below phone -->
  <line x1="70" y1="210" x2="190" y2="210" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.1"/>
  <!-- Mini bar chart -->
  <rect x="75" y="195" width="10" height="15" rx="1" fill="#D4AF37" fill-opacity="0.15"/>
  <rect x="92" y="188" width="10" height="22" rx="1" fill="#D4AF37" fill-opacity="0.25"/>
  <rect x="109" y="182" width="10" height="28" rx="1" fill="#D4AF37" fill-opacity="0.35"/>
  <rect x="126" y="190" width="10" height="20" rx="1" fill="#D4AF37" fill-opacity="0.2"/>
  <rect x="143" y="178" width="10" height="32" rx="1" fill="#D4AF37" fill-opacity="0.45"/>
  <rect x="160" y="185" width="10" height="25" rx="1" fill="#D4AF37" fill-opacity="0.3"/>
  <rect x="177" y="175" width="10" height="35" rx="1" fill="#D4AF37" fill-opacity="0.5"/>
  <!-- Label area -->
  <text x="130" y="270" text-anchor="middle" fill="#D4AF37" font-family="sans-serif" font-size="11" font-weight="600" letter-spacing="3" opacity="0.5">ANALYTICS</text>
  <text x="130" y="295" text-anchor="middle" fill="white" font-family="serif" font-size="20" font-weight="600" opacity="0.7">Call Tracking</text>
  <text x="130" y="320" text-anchor="middle" fill="white" font-family="sans-serif" font-size="11" opacity="0.25">Every call, tracked by source</text>
</svg>