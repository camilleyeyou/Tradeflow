  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" fill="none" stroke="#D4AF37" stroke-opacity="0.45"/>
  <g fill="#D4AF37">
    <!-- T top bar -->
    <rect x="5.5" y="6.5" width="21" height="4.75" rx="1.5"/>
    <!-- T stem -->
    <rect x="13.5" y="9.5" width="5" height="16" rx="1.5"/>
    <!-- Flow drop -->
    <circle cx="24.5" cy="21.5" r="1.7"/>
  </g>
</svg>
