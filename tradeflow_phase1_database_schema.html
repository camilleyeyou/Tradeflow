<style>
#erd svg { width: 100%; }
#erd svg.erDiagram .divider path { stroke-opacity: 0.4; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd" style="padding: 8px 0;"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#1a2e42' : '#e8f4fd',
    primaryBorderColor: dark ? '#378ADD' : '#185FA5',
    primaryTextColor: dark ? '#c2c0b6' : '#0C447C',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  clients {
    uuid id PK
    text business_name
    text owner_name
    text email
    text phone
    text city
    text[] service_area_zips
    text ghl_sub_account_id
    text callrail_number
    text stripe_customer_id
    text plan
    timestamp created_at
    timestamp trial_ends_at
    bool is_active
  }

  leads {
    uuid id PK
    uuid client_id FK
    text homeowner_name
    text phone
    text email
    text zip_code
    text service_type
    text source
    text status
    int lead_score
    text notes
    timestamp created_at
    timestamp contacted_at
    timestamp booked_at
  }

  calls {
    uuid id PK
    uuid client_id FK
    uuid lead_id FK
    text callrail_call_id
    text caller_number
    int duration_seconds
    text recording_url
    text transcript
    text outcome
    timestamp called_at
  }

  sms_sequences {
    uuid id PK
    uuid lead_id FK
    int touch_number
    text message_body
    text ghl_message_id
    text status
    timestamp scheduled_at
    timestamp sent_at
  }

  billing {
    uuid id PK
    uuid client_id FK
    text stripe_subscription_id
    text stripe_invoice_id
    int amount_cents
    text status
    timestamp period_start
    timestamp period_end
    timestamp paid_at
  }

  clients ||--o{ leads : "has"
  clients ||--o{ calls : "receives"
  clients ||--o{ billing : "billed via"
  leads ||--o{ calls : "generates"
  leads ||--o{ sms_sequences : "triggers"
`);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
